<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Promotores - Ventas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        h2 {
            margin: 25px 0 15px 0;
            color: #4a5568;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 5px;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2d3748;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: 0.2s;
            background-color: #f9fafb;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            background-color: white;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
            flex-wrap: wrap;
        }
        .radio-group label {
            font-weight: normal;
            margin-right: 15px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .radio-group input {
            width: auto;
            margin-right: 5px;
        }

        .plan-card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 15px;
            margin-top: 10px;
            border: 1px solid #e2e8f0;
        }

        .plan-option {
            display: inline-block;
            margin: 8px 12px 8px 0;
            padding: 8px 16px;
            background: #edf2f7;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .plan-option.selected {
            background: #667eea;
            color: white;
            border-color: #5a67d8;
        }
        .plan-option:hover {
            background: #cbd5e0;
        }

        .benefits {
            background: #e9f5ff;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .benefits p {
            margin: 5px 0;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: block;
            width: 100%;
            max-width: 250px;
            margin: 30px auto 10px;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .success {
            background-color: #c6f6d5;
            color: #22543d;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }
        .error {
            color: #e53e3e;
            font-size: 0.8rem;
            margin-top: 4px;
        }
        .required:after {
            content: " *";
            color: #e53e3e;
        }
        hr {
            margin: 20px 0;
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, #cbd5e0, transparent);
        }
        .hidden {
            display: none;
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .form-group { min-width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Formulario de Ventas</h1>
    <div class="subtitle">Registro de altas y paquetes</div>

    <form id="ventaForm">
        <!-- ========== TIPO DE VENTA ========== -->
        <div class="form-group">
            <label class="required">TIPO DE VENTA</label>
            <select id="tipoVenta" required>
                <option value="">Seleccione...</option>
                <option value="SERVICIO NUEVO">SERVICIO NUEVO</option>
                <option value="ALTA COMERCIAL">ALTA COMERCIAL</option>
                <option value="ALTA RESIDENCIAL">ALTA RESIDENCIAL</option>
                <option value="ALTA INTERNET RECUPERADO">ALTA INTERNET RECUPERADO</option>
                <option value="OTROS">OTROS (especificar)</option>
            </select>
            <div id="otrosDiv" class="hidden">
                <label>Especificar otro tipo de venta:</label>
                <input type="text" id="otrosTexto">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>FOLIO SIAC</label>
                <input type="number" id="folioSiac" step="1">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="required">GERENTE DE ZONA</label>
                <input type="text" id="gerenteZona" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="required">NOMBRE DEL PROMOTOR</label>
                <input type="text" id="nombrePromotor" required>
            </div>
            <div class="form-group">
                <label class="required">CLAVE PROMOTOR</label>
                <input type="number" id="clavePromotor" step="1" required>
            </div>
        </div>

        <!-- ========== DATOS DEL CLIENTE ========== -->
        <h2>📇 DATOS DEL CLIENTE</h2>
        <div class="form-row">
            <div class="form-group">
                <label class="required">Nombre del cliente</label>
                <input type="text" id="nombreCliente" required>
            </div>
            <div class="form-group">
                <label class="required">Celular (10 dígitos)</label>
                <input type="tel" id="celularCliente" pattern="[0-9]{10}" maxlength="10" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Celular adicional 1</label>
                <input type="tel" id="celularAdicional" pattern="[0-9]{10}" maxlength="10">
            </div>
            <div class="form-group">
                <label class="required">Correo electrónico</label>
                <input type="email" id="correo" required>
            </div>
        </div>
        <div class="form-group">
            <label>Compañía actual</label>
            <input type="text" id="companiaActual">
        </div>

        <!-- ========== DOMICILIO ========== -->
        <h2>🏠 DOMICILIO DEL CLIENTE</h2>
        <div class="form-group">
            <label class="required">Calle y número</label>
            <input type="text" id="calleNumero" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="required">Entre calle 1</label>
                <input type="text" id="entreCalle1" required>
            </div>
            <div class="form-group">
                <label class="required">Entre calle 2</label>
                <input type="text" id="entreCalle2" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="required">Colonia</label>
                <input type="text" id="colonia" required>
            </div>
            <div class="form-group">
                <label class="required">Municipio</label>
                <input type="text" id="municipio" required>
            </div>
            <div class="form-group">
                <label class="required">Código postal</label>
                <input type="text" id="cp" required>
            </div>
        </div>

        <!-- ========== PAQUETE QUE REQUIERE (NUEVO) ========== -->
        <h2>📦 PAQUETE QUE REQUIERE</h2>
        
        <!-- Tipo de cliente: Residencial / Comercial -->
        <div class="form-group">
            <label class="required">Tipo de plan</label>
            <div class="radio-group">
                <label><input type="radio" name="tipoPlan" value="Residencial" required> Residencial</label>
                <label><input type="radio" name="tipoPlan" value="Comercial"> Comercial</label>
            </div>
        </div>

        <!-- Modalidad: Internet+Telefonía / Solo Internet -->
        <div class="form-group">
            <label class="required">Modalidad</label>
            <div class="radio-group">
                <label><input type="radio" name="modalidad" value="Internet+Telefonía" required> Internet + Telefonía</label>
                <label><input type="radio" name="modalidad" value="Solo Internet"> Solo Internet</label>
            </div>
        </div>

        <!-- Selección de velocidad/precio (dinámica) -->
        <div class="form-group">
            <label class="required">Selecciona velocidad y precio</label>
            <div id="planesContainer" class="plan-card">
                <p style="color: #718096;">Primero elige tipo de plan y modalidad</p>
            </div>
        </div>

        <!-- Beneficios mostrados automáticamente -->
        <div id="beneficiosContainer" class="benefits hidden">
            <strong>✨ Beneficios incluidos:</strong>
            <p id="beneficioContratacion"></p>
            <p id="beneficioDomiciliacion"></p>
        </div>

        <!-- Otros campos del paquete -->
        <div class="form-row">
            <div class="form-group">
                <label class="required">Gastos de instalación</label>
                <input type="text" id="gastosInstalacion" required>
            </div>
            <div class="form-group">
                <label>Promoción (opcional)</label>
                <input type="text" id="promocion">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Comprobante que entregó el cliente</label>
                <input type="text" id="comprobante">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Terminal - Clave</label>
                <input type="number" id="terminalClave" step="1">
            </div>
            <div class="form-group">
                <label>Terminal - Célula</label>
                <input type="number" id="terminalCelula" step="1">
            </div>
        </div>
        <div class="form-group">
            <label>Observación</label>
            <textarea id="observacion" rows="3"></textarea>
        </div>

        <hr>
        <button type="submit">📤 Enviar a Google Sheets</button>
        <div id="mensaje"></div>
    </form>
</div>

<script>
    // --------------------------------------------------------------
    // BASE DE DATOS DE PLANES (según el archivo Planes.xlsx)
    // --------------------------------------------------------------
    const planesData = {
        Residencial: {
            "Internet+Telefonía": [
                { precio: 389, megas: 120, beneficioNuevo: "Netflix Estándar con anuncios o HBO Max con anuncios por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" },
                { precio: 435, megas: 150, beneficioNuevo: "Netflix Estándar con anuncios o HBO Max con anuncios por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" },
                { precio: 499, megas: 250, beneficioNuevo: "Netflix Estándar con anuncios o HBO Max con anuncios por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" },
                { precio: 599, megas: 350, beneficioNuevo: "Netflix Estándar con anuncios o HBO Max con anuncios por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" },
                { precio: 649, megas: 500, beneficioNuevo: "Netflix Estándar con anuncios o HBO Max con anuncios por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" }
            ],
            "Solo Internet": [
                { precio: 349, megas: 120, beneficioNuevo: "HBO MAX con anuncios, por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" },
                { precio: 399, megas: 150, beneficioNuevo: "HBO MAX con anuncios, por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" },
                { precio: 449, megas: 250, beneficioNuevo: "HBO MAX con anuncios, por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" },
                { precio: 499, megas: 350, beneficioNuevo: "HBO MAX con anuncios, por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" },
                { precio: 549, megas: 500, beneficioNuevo: "HBO MAX con anuncios, por 6 meses. Universal+ con Claro Video", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios o F1TV" }
            ]
        },
        Comercial: {
            "Internet+Telefonía": [
                { precio: 399, megas: 120, beneficioNuevo: "Netflix Estándar con anuncios o HBO Max con anuncios por 6 meses. + Soluciones Negocio", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios." },
                { precio: 549, megas: 250, beneficioNuevo: "HBO MAX con anuncios por 6 meses. + Antivirus Seguridad Internet", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios." },
                { precio: 799, megas: 500, beneficioNuevo: "HBO MAX con anuncios por 6 meses. + Antivirus Seguridad Internet", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios." }
            ],
            "Solo Internet": [
                { precio: 349, megas: 120, beneficioNuevo: "HBO MAX con anuncios por 6 meses. + Antivirus Seguridad Internet", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios." },
                { precio: 449, megas: 250, beneficioNuevo: "HBO MAX con anuncios por 6 meses. + Antivirus Seguridad Internet", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios." },
                { precio: 499, megas: 350, beneficioNuevo: "HBO MAX con anuncios por 6 meses. + Antivirus Seguridad Internet", beneficioDomicilio: "Elige un entretenimiento adicional por 6 meses sin costo: Netflix con anuncios o HBO Max con anuncios." }
            ]
        }
    };

    // Variables para almacenar el plan seleccionado
    let selectedPlan = null;

    // Función para actualizar el contenedor de planes según tipoPlan y modalidad
    function actualizarPlanes() {
        const tipoPlanElem = document.querySelector('input[name="tipoPlan"]:checked');
        const modalidadElem = document.querySelector('input[name="modalidad"]:checked');
        if (!tipoPlanElem || !modalidadElem) {
            document.getElementById('planesContainer').innerHTML = '<p style="color: #718096;">Primero elige tipo de plan y modalidad</p>';
            document.getElementById('beneficiosContainer').classList.add('hidden');
            selectedPlan = null;
            return;
        }
        const tipo = tipoPlanElem.value;
        const modalidad = modalidadElem.value;
        const planesList = planesData[tipo]?.[modalidad];
        if (!planesList) {
            document.getElementById('planesContainer').innerHTML = '<p style="color: red;">No hay planes para esta combinación</p>';
            return;
        }
        // Generar botones de selección
        let html = '<div style="display: flex; flex-wrap: wrap;">';
        planesList.forEach((plan, idx) => {
            html += `<div class="plan-option" data-precio="${plan.precio}" data-megas="${plan.megas}" data-beneficio-nuevo="${plan.beneficioNuevo.replace(/"/g, '&quot;')}" data-beneficio-domicilio="${plan.beneficioDomicilio.replace(/"/g, '&quot;')}">
                        ${plan.precio} $ / mes  -  ${plan.megas} Megas
                     </div>`;
        });
        html += '</div>';
        document.getElementById('planesContainer').innerHTML = html;
        
        // Agregar event listeners a los botones
        document.querySelectorAll('.plan-option').forEach(el => {
            el.addEventListener('click', function() {
                // Quitar clase selected de todos
                document.querySelectorAll('.plan-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                selectedPlan = {
                    precio: this.dataset.precio,
                    megas: this.dataset.megas,
                    beneficioNuevo: this.dataset.beneficioNuevo,
                    beneficioDomicilio: this.dataset.beneficioDomicilio
                };
                // Mostrar beneficios
                document.getElementById('beneficiosContainer').classList.remove('hidden');
                document.getElementById('beneficioContratacion').innerHTML = `🎁 <strong>Al contratar:</strong> ${selectedPlan.beneficioNuevo}`;
                document.getElementById('beneficioDomiciliacion').innerHTML = `🏠 <strong>Por domiciliar pago:</strong> ${selectedPlan.beneficioDomicilio}`;
            });
        });
    }

    // Escuchar cambios en los radio buttons
    document.querySelectorAll('input[name="tipoPlan"], input[name="modalidad"]').forEach(radio => {
        radio.addEventListener('change', actualizarPlanes);
    });

    // --------------------------------------------------------------
    // PERSISTENCIA DE PROMOTOR
    // --------------------------------------------------------------
    function cargarPersistentes() {
        const nombre = localStorage.getItem('nombrePromotor');
        const clave = localStorage.getItem('clavePromotor');
        if (nombre) document.getElementById('nombrePromotor').value = nombre;
        if (clave) document.getElementById('clavePromotor').value = clave;
    }
    function guardarPersistentes() {
        const nombre = document.getElementById('nombrePromotor').value;
        const clave = document.getElementById('clavePromotor').value;
        if (nombre) localStorage.setItem('nombrePromotor', nombre);
        if (clave) localStorage.setItem('clavePromotor', clave);
    }
    document.getElementById('nombrePromotor').addEventListener('change', guardarPersistentes);
    document.getElementById('clavePromotor').addEventListener('change', guardarPersistentes);

    // Mostrar/ocultar "OTROS" en tipo venta
    function manejarTipoVenta() {
        const select = document.getElementById('tipoVenta');
        const otrosDiv = document.getElementById('otrosDiv');
        if (select.value === 'OTROS') {
            otrosDiv.classList.remove('hidden');
            document.getElementById('otrosTexto').required = true;
        } else {
            otrosDiv.classList.add('hidden');
            document.getElementById('otrosTexto').required = false;
        }
    }
    document.getElementById('tipoVenta').addEventListener('change', manejarTipoVenta);

    // Validar celular
    function validarCelular(input) {
        const valor = input.value;
        if (valor && !/^\d{10}$/.test(valor)) {
            input.setCustomValidity('Debe tener 10 dígitos numéricos');
        } else {
            input.setCustomValidity('');
        }
    }
    document.getElementById('celularCliente').addEventListener('input', function() { validarCelular(this); });
    document.getElementById('celularAdicional').addEventListener('input', function() { validarCelular(this); });

    // --------------------------------------------------------------
    // ENVÍO DEL FORMULARIO
    // --------------------------------------------------------------
    document.getElementById('ventaForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // Validaciones básicas
        if (!selectedPlan) {
            alert('Debes seleccionar un plan (precio/velocidad)');
            return;
        }
        const celular = document.getElementById('celularCliente');
        if (!/^\d{10}$/.test(celular.value)) {
            celular.setCustomValidity('Celular debe tener 10 dígitos');
            celular.reportValidity();
            return;
        }
        const celularAd = document.getElementById('celularAdicional');
        if (celularAd.value && !/^\d{10}$/.test(celularAd.value)) {
            celularAd.setCustomValidity('Celular adicional debe tener 10 dígitos');
            celularAd.reportValidity();
            return;
        }

        // Tipo de venta (con opción otros)
        let tipoVenta = document.getElementById('tipoVenta').value;
        if (tipoVenta === 'OTROS') {
            const otrosTexto = document.getElementById('otrosTexto').value.trim();
            if (!otrosTexto) { alert('Especifica el tipo de venta'); return; }
            tipoVenta = otrosTexto;
        }

        // Datos generales
        const folioSiac = document.getElementById('folioSiac').value || '';
        const gerenteZona = document.getElementById('gerenteZona').value;
        const nombrePromotor = document.getElementById('nombrePromotor').value;
        const clavePromotor = document.getElementById('clavePromotor').value;
        const nombreCliente = document.getElementById('nombreCliente').value;
        const celularCliente = celular.value;
        const celularAdicional = document.getElementById('celularAdicional').value || '';
        const correo = document.getElementById('correo').value;
        const calleNumero = document.getElementById('calleNumero').value;
        const entreCalle1 = document.getElementById('entreCalle1').value;
        const entreCalle2 = document.getElementById('entreCalle2').value;
        const colonia = document.getElementById('colonia').value;
        const municipio = document.getElementById('municipio').value;
        const cp = document.getElementById('cp').value;
        const direccionCompleta = `${calleNumero}, entre ${entreCalle1} y ${entreCalle2}, ${colonia}, ${municipio}, CP ${cp}`;

        // Datos del plan seleccionado
        const tipoPlan = document.querySelector('input[name="tipoPlan"]:checked').value;
        const modalidad = document.querySelector('input[name="modalidad"]:checked').value;
        const velocidad = selectedPlan.megas;
        const precio = selectedPlan.precio;
        const beneficioContratacion = selectedPlan.beneficioNuevo;
        const beneficioDomiciliacion = selectedPlan.beneficioDomicilio;
        const gastosInstalacion = document.getElementById('gastosInstalacion').value;
        const promocion = document.getElementById('promocion').value || '';
        const comprobante = document.getElementById('comprobante').value || '';
        const terminalClave = document.getElementById('terminalClave').value || '';
        const terminalCelula = document.getElementById('terminalCelula').value || '';
        const observacion = document.getElementById('observacion').value || '';

        // Para la columna "PAQUETE" (original) pondremos una descripción resumida
        const descripcionPaquete = `${tipoPlan} - ${modalidad} - ${velocidad} Megas - $${precio}`;

        // Armar objeto para enviar (coincide con las columnas de la hoja)
        const datos = {
            fecha: new Date().toLocaleDateString('es-ES', { timeZone: 'America/Caracas' }),
            validador: '',
            estatus: '',
            folioSiac: folioSiac,
            tipoVenta: tipoVenta,
            estrategia: terminalCelula,   // campo célula
            gerentes: gerenteZona,
            clavePromotor: clavePromotor,
            nombreCliente: nombreCliente,
            celularCliente: celularCliente,
            celularReferencia: celularAdicional,
            correo: correo,
            direccion: direccionCompleta,
            paquete: descripcionPaquete,
            costoPaquete: precio,
            observacion: observacion,
            // Nuevas columnas:
            tipoPlan: tipoPlan,
            modalidad: modalidad,
            velocidad: velocidad,
            precioDetalle: precio,
            beneficioContratacion: beneficioContratacion,
            beneficioDomiciliacion: beneficioDomiciliacion,
            gastosInstalacion: gastosInstalacion,
            promocion: promocion,
            comprobante: comprobante,
            terminalClave: terminalClave,
            terminalCelula: terminalCelula
        };

        // ⚠️ REEMPLAZA ESTA URL CON LA DE TU APPS SCRIPT
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwwktexyamNF_RxhghICo9CmeNcCirzSwN8fc2m58XVFAOA8eEYcP-lGDDpmzhtFvny/exec';

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(datos)
            });
            document.getElementById('mensaje').innerHTML = '<div class="success">✅ Datos enviados correctamente.</div>';
            this.reset();
            cargarPersistentes();
            // Limpiar selección de planes y beneficios
            selectedPlan = null;
            document.getElementById('planesContainer').innerHTML = '<p style="color: #718096;">Primero elige tipo de plan y modalidad</p>';
            document.getElementById('beneficiosContainer').classList.add('hidden');
            setTimeout(() => document.getElementById('mensaje').innerHTML = '', 5000);
        } catch (error) {
            document.getElementById('mensaje').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
        }
    });

    cargarPersistentes();
    manejarTipoVenta();
</script>
</body>
</html>
