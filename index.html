<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Promotores - Ventas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        h2 { margin: 25px 0 15px 0; color: #4a5568; border-left: 4px solid #667eea; padding-left: 12px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 5px; }
        .form-group { flex: 1; min-width: 200px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #2d3748; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: 0.2s;
            background-color: #f9fafb;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            background-color: white;
        }
        .radio-group { display: flex; gap: 20px; margin-top: 5px; flex-wrap: wrap; }
        .radio-group label { font-weight: normal; margin-right: 15px; display: inline-flex; align-items: center; gap: 5px; }
        .radio-group input { width: auto; margin-right: 5px; }
        .plan-card { background: #f7fafc; border-radius: 12px; padding: 15px; margin-top: 10px; border: 1px solid #e2e8f0; }
        .plan-option { display: inline-block; margin: 8px 12px 8px 0; padding: 8px 16px; background: #edf2f7; border-radius: 40px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .plan-option.selected { background: #667eea; color: white; border-color: #5a67d8; }
        .plan-option:hover { background: #cbd5e0; }
        .benefits-section { background: #e9f5ff; padding: 12px; border-radius: 10px; margin-top: 15px; }
        .inline-checkbox { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
        .inline-checkbox input { width: auto; }
        .imagenes-section { background: #f0fff4; border: 1px solid #c6f6d5; border-radius: 12px; padding: 15px; margin-top: 20px; }
        .preview-images { margin-top: 10px; font-size: 0.85rem; color: #2d3748; background: #edf2f7; padding: 8px; border-radius: 8px; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: block;
            width: 100%;
            max-width: 250px;
            margin: 30px auto 10px;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .success { background-color: #c6f6d5; color: #22543d; padding: 12px; border-radius: 8px; margin-top: 15px; text-align: center; }
        .error { background-color: #fed7d7; color: #9b2c2c; padding: 12px; border-radius: 8px; margin-top: 15px; text-align: center; }
        .loading { background-color: #e2e8f0; color: #4a5568; padding: 12px; border-radius: 8px; margin-top: 15px; text-align: center; }
        .required:after { content: " *"; color: #e53e3e; }
        hr { margin: 20px 0; border: 0; height: 1px; background: linear-gradient(to right, transparent, #cbd5e0, transparent); }
        .hidden { display: none; }
        @media (max-width: 768px) { .container { padding: 20px; } .form-group { min-width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Formulario de Ventas</h1>
    <div class="subtitle">Registro de altas y paquetes</div>

    <form id="ventaForm">
        <div class="form-group">
            <label class="required">TIPO DE VENTA</label>
            <select id="tipoVenta" required>
                <option value="">Cargando tipos...</option>
            </select>
            <div id="otrosDiv" class="hidden">
                <label>Especificar otro tipo de venta:</label>
                <input type="text" id="otrosTexto">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>FOLIO SIAC</label>
                <input type="number" id="folioSiac" step="1">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="required">GERENTE DE ZONA</label>
                <select id="gerenteZona" required>
                    <option value="">Cargando gerentes...</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="required">NOMBRE DEL PROMOTOR</label>
                <input type="text" id="nombrePromotor" required>
            </div>
            <div class="form-group">
                <label class="required">CLAVE PROMOTOR</label>
                <input type="number" id="clavePromotor" step="1" required>
            </div>
        </div>

        <h2>📇 DATOS DEL CLIENTE</h2>
        <div class="form-row">
            <div class="form-group">
                <label class="required">Nombre del cliente</label>
                <input type="text" id="nombreCliente" required>
            </div>
            <div class="form-group">
                <label class="required">Celular (10 dígitos)</label>
                <input type="tel" id="celularCliente" pattern="[0-9]{10}" maxlength="10" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Celular adicional 1</label>
                <input type="tel" id="celularAdicional" pattern="[0-9]{10}" maxlength="10">
            </div>
            <div class="form-group">
                <label class="required">Correo electrónico</label>
                <input type="email" id="correo" required>
            </div>
        </div>
        <div class="form-group">
            <label>Compañía actual</label>
            <input type="text" id="companiaActual">
        </div>

        <h2>🏠 DOMICILIO DEL CLIENTE</h2>
        <div class="form-group">
            <label class="required">Calle y número</label>
            <input type="text" id="calleNumero" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="required">Entre calle 1</label>
                <input type="text" id="entreCalle1" required>
            </div>
            <div class="form-group">
                <label class="required">Entre calle 2</label>
                <input type="text" id="entreCalle2" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="required">Colonia</label>
                <input type="text" id="colonia" required>
            </div>
            <div class="form-group">
                <label class="required">Municipio</label>
                <input type="text" id="municipio" required>
            </div>
            <div class="form-group">
                <label class="required">Código postal</label>
                <input type="text" id="cp" required>
            </div>
        </div>

        <h2>📦 PAQUETE QUE REQUIERE</h2>
        
        <div class="form-group">
            <label class="required">Tipo de plan</label>
            <div class="radio-group">
                <label><input type="radio" name="tipoPlan" value="Residencial" required> Residencial</label>
                <label><input type="radio" name="tipoPlan" value="Comercial"> Comercial</label>
            </div>
        </div>

        <div class="form-group">
            <label class="required">Modalidad</label>
            <div class="radio-group">
                <label><input type="radio" name="modalidad" value="Internet+Telefonía" required> Internet + Telefonía</label>
                <label><input type="radio" name="modalidad" value="Solo Internet"> Solo Internet</label>
            </div>
        </div>

        <div class="form-group">
            <label class="required">Selecciona velocidad y precio</label>
            <div id="planesContainer" class="plan-card">
                <p style="color: #718096;">Primero elige tipo de plan y modalidad</p>
            </div>
        </div>

        <div id="beneficioContratacionDiv" class="benefits-section hidden">
            <strong>🎁 Beneficio por contratación</strong>
            <select id="beneficioContratacionSelect" style="width: 100%;"></select>
        </div>

        <div class="inline-checkbox">
            <input type="checkbox" id="domiciliacionCheckbox">
            <label for="domiciliacionCheckbox" style="font-weight: normal;">✅ El cliente domicilia el pago</label>
        </div>

        <div id="beneficioDomiciliacionDiv" class="benefits-section hidden">
            <strong>🏠 Beneficio por domiciliación</strong>
            <select id="beneficioDomiciliacionSelect" style="width: 100%;"></select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="required">Gastos de instalación</label>
                <input type="text" id="gastosInstalacion" required>
            </div>
            <div class="form-group">
                <label>Observación (opcional)</label>
                <textarea id="observacion" rows="2"></textarea>
            </div>
        </div>

        <div class="imagenes-section">
            <label>📸 Imágenes (máximo 15 archivos)</label>
            <input type="file" id="imagenes" accept="image/*" multiple>
            <div id="previewImagenes" class="preview-images hidden"></div>
        </div>

        <hr>
        <button type="submit">📤 Enviar a Google Sheets</button>
        <div id="mensaje"></div>
    </form>
</div>

        }
    };

    let selectedPlanObj = null;

    // Cargar selectores desde Apps Script
    async function cargarSelectores() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            const tipoSelect = document.getElementById('tipoVenta');
            if (data.tiposVenta && data.tiposVenta.length > 0) {
                tipoSelect.innerHTML = '<option value="">Seleccione...</option>';
                data.tiposVenta.forEach(tipo => {
                    const option = document.createElement('option');
                    option.value = tipo;
                    option.textContent = tipo;
                    tipoSelect.appendChild(option);
                });
                const optionOtros = document.createElement('option');
                optionOtros.value = "OTROS";
                optionOtros.textContent = "OTROS (especificar)";
                tipoSelect.appendChild(optionOtros);
            }
            
            const gerenteSelect = document.getElementById('gerenteZona');
            if (data.gerentes && data.gerentes.length > 0) {
                gerenteSelect.innerHTML = '<option value="">Seleccione un gerente...</option>';
                data.gerentes.forEach(gerente => {
                    const option = document.createElement('option');
                    option.value = gerente;
                    option.textContent = gerente;
                    gerenteSelect.appendChild(option);
                });
            }
        } catch (error) {
            console.error('Error cargando datos:', error);
        }
    }

    document.getElementById('gerenteZona').addEventListener('change', function() {
        if (this.value) localStorage.setItem('gerenteZona', this.value);
    });

    function cargarPersistentes() {
        const nombre = localStorage.getItem('nombrePromotor');
        const clave = localStorage.getItem('clavePromotor');
        const gerente = localStorage.getItem('gerenteZona');
        if (nombre) document.getElementById('nombrePromotor').value = nombre;
        if (clave) document.getElementById('clavePromotor').value = clave;
        if (gerente) document.getElementById('gerenteZona').value = gerente;
    }
    
    function guardarPersistentes() {
        const nombre = document.getElementById('nombrePromotor').value;
        const clave = document.getElementById('clavePromotor').value;
        if (nombre) localStorage.setItem('nombrePromotor', nombre);
        if (clave) localStorage.setItem('clavePromotor', clave);
    }

    document.getElementById('nombrePromotor').addEventListener('change', guardarPersistentes);
    document.getElementById('clavePromotor').addEventListener('change', guardarPersistentes);

    function manejarTipoVenta() {
        const select = document.getElementById('tipoVenta');
        const otrosDiv = document.getElementById('otrosDiv');
        if (select.value === 'OTROS') {
            otrosDiv.classList.remove('hidden');
            document.getElementById('otrosTexto').required = true;
        } else {
            otrosDiv.classList.add('hidden');
            document.getElementById('otrosTexto').required = false;
        }
    }
    document.getElementById('tipoVenta').addEventListener('change', manejarTipoVenta);

    function validarCelular(input) {
        const valor = input.value;
        if (valor && !/^\d{10}$/.test(valor)) {
            input.setCustomValidity('Debe tener 10 dígitos');
        } else {
            input.setCustomValidity('');
        }
    }
    document.getElementById('celularCliente').addEventListener('input', function() { validarCelular(this); });
    document.getElementById('celularAdicional').addEventListener('input', function() { validarCelular(this); });

    function actualizarPlanes() {
        const tipoPlanElem = document.querySelector('input[name="tipoPlan"]:checked');
        const modalidadElem = document.querySelector('input[name="modalidad"]:checked');
        if (!tipoPlanElem || !modalidadElem) {
            document.getElementById('planesContainer').innerHTML = '<p style="color: #718096;">Primero elige tipo de plan y modalidad</p>';
            ocultarBeneficios();
            selectedPlanObj = null;
            return;
        }
        const tipo = tipoPlanElem.value;
        const modalidad = modalidadElem.value;
        const planesList = planesData[tipo]?.[modalidad];
        if (!planesList) return;
        
        let html = '<div style="display: flex; flex-wrap: wrap;">';
        planesList.forEach(plan => {
            html += `<div class="plan-option" data-precio="${plan.precio}" data-megas="${plan.megas}" 
                            data-opciones-contratacion='${JSON.stringify(plan.opcionesContratacion)}'
                            data-opciones-domiciliacion='${JSON.stringify(plan.opcionesDomiciliacion)}'>
                        ${plan.precio} $ / mes  -  ${plan.megas} Megas
                     </div>`;
        });
        html += '</div>';
        document.getElementById('planesContainer').innerHTML = html;
        
        document.querySelectorAll('.plan-option').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('.plan-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                selectedPlanObj = {
                    precio: this.dataset.precio,
                    megas: this.dataset.megas,
                    opcionesContratacion: JSON.parse(this.dataset.opcionesContratacion),
                    opcionesDomiciliacion: JSON.parse(this.dataset.opcionesDomiciliacion)
                };
                mostrarBeneficiosContratacion();
                if (document.getElementById('domiciliacionCheckbox').checked) {
                    mostrarBeneficiosDomiciliacion();
                } else {
                    ocultarBeneficiosDomiciliacion();
                }
            });
        });
        const primerPlan = document.querySelector('.plan-option');
        if (primerPlan) primerPlan.click();
    }

    function mostrarBeneficiosContratacion() {
        const div = document.getElementById('beneficioContratacionDiv');
        const select = document.getElementById('beneficioContratacionSelect');
        if (!selectedPlanObj) {
            div.classList.add('hidden');
            return;
        }
        div.classList.remove('hidden');
        select.innerHTML = '';
        selectedPlanObj.opcionesContratacion.forEach(op => {
            const option = document.createElement('option');
            option.value = op;
            option.textContent = op;
            select.appendChild(option);
        });
    }

    function mostrarBeneficiosDomiciliacion() {
        const div = document.getElementById('beneficioDomiciliacionDiv');
        const select = document.getElementById('beneficioDomiciliacionSelect');
        if (!selectedPlanObj) {
            div.classList.add('hidden');
            return;
        }
        div.classList.remove('hidden');
        select.innerHTML = '';
        selectedPlanObj.opcionesDomiciliacion.forEach(op => {
            const option = document.createElement('option');
            option.value = op;
            option.textContent = op;
            select.appendChild(option);
        });
    }

    function ocultarBeneficios() {
        document.getElementById('beneficioContratacionDiv').classList.add('hidden');
        ocultarBeneficiosDomiciliacion();
    }

    function ocultarBeneficiosDomiciliacion() {
        document.getElementById('beneficioDomiciliacionDiv').classList.add('hidden');
    }

    document.querySelectorAll('input[name="tipoPlan"], input[name="modalidad"]').forEach(radio => {
        radio.addEventListener('change', actualizarPlanes);
    });
    
    document.getElementById('domiciliacionCheckbox').addEventListener('change', function(e) {
        if (this.checked && selectedPlanObj) {
            mostrarBeneficiosDomiciliacion();
        } else {
            ocultarBeneficiosDomiciliacion();
        }
    });

    const inputImagenes = document.getElementById('imagenes');
    const previewDiv = document.getElementById('previewImagenes');
    
    inputImagenes.addEventListener('change', function() {
        const files = Array.from(this.files);
        if (files.length > 15) {
            alert('Máximo 15 imágenes');
            this.value = '';
            previewDiv.classList.add('hidden');
            return;
        }
        if (files.length > 0) {
            previewDiv.classList.remove('hidden');
            previewDiv.innerHTML = `<strong>📷 ${files.length} archivo(s) seleccionado(s):</strong><br>${files.map(f => f.name).join(', ')}`;
        } else {
            previewDiv.classList.add('hidden');
        }
    });

    // ENVÍO DEL FORMULARIO
    document.getElementById('ventaForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if (!selectedPlanObj) { 
            alert('Selecciona un plan'); 
            return; 
        }
        
        const celular = document.getElementById('celularCliente');
        if (!/^\d{10}$/.test(celular.value)) { 
            alert('Celular debe tener 10 dígitos'); 
            return; 
        }
        
        let tipoVenta = document.getElementById('tipoVenta').value;
        if (tipoVenta === 'OTROS') {
            const otrosTexto = document.getElementById('otrosTexto').value.trim();
            if (!otrosTexto) { 
                alert('Especifica el tipo de venta'); 
                return; 
            }
            tipoVenta = otrosTexto;
        }
        
        const beneficioContratacion = document.getElementById('beneficioContratacionSelect').value;
        if (!beneficioContratacion) { 
            alert('Selecciona beneficio de contratación'); 
            return; 
        }
        
        let beneficioDomiciliacion = "No aplica";
        if (document.getElementById('domiciliacionCheckbox').checked) {
            beneficioDomiciliacion = document.getElementById('beneficioDomiciliacionSelect').value;
            if (!beneficioDomiciliacion) { 
                alert('Selecciona beneficio de domiciliación'); 
                return; 
            }
        }
        
        const textoBeneficios = `CONTRATACION: ${beneficioContratacion}. DOMICILIACIÓN: ${beneficioDomiciliacion}`;
        
        const direccionCompleta = `${document.getElementById('calleNumero').value}, entre ${document.getElementById('entreCalle1').value} y ${document.getElementById('entreCalle2').value}, ${document.getElementById('colonia').value}, ${document.getElementById('municipio').value}, CP ${document.getElementById('cp').value}`;
        
        const datosTexto = {
            folioSiac: document.getElementById('folioSiac').value || '',
            tipoVenta: tipoVenta,
            estrategia: '',
            gerentes: document.getElementById('gerenteZona').value,
            clavePromotor: document.getElementById('clavePromotor').value,
            nombreCliente: document.getElementById('nombreCliente').value,
            celularCliente: celular.value,
            celularReferencia: document.getElementById('celularAdicional').value || '',
            correo: document.getElementById('correo').value,
            direccion: direccionCompleta,
            paquete: selectedPlanObj.precio,
            velocidad: selectedPlanObj.megas,
            gastosInstalacion: document.getElementById('gastosInstalacion').value,
            beneficios: textoBeneficios,
            observacion: document.getElementById('observacion').value || ''
        };
        
        const files = inputImagenes.files;
        const mensajeDiv = document.getElementById('mensaje');
        
        mensajeDiv.innerHTML = '<div class="loading">⏳ Procesando imágenes... (' + files.length + ' archivos)</div>';
        
        // Convertir imágenes a Base64
        const imagenesBase64 = [];
        
        for (let i = 0; i < files.length && i < 15; i++) {
            const file = files[i];
            mensajeDiv.innerHTML = '<div class="loading">⏳ Procesando imagen ' + (i + 1) + ' de ' + files.length + '...</div>';
            
            const reader = new FileReader();
            const base64Data = await new Promise((resolve) => {
                reader.onload = function(e) {
                    const result = e.target.result;
                    const base64 = result.split(',')[1];
                    resolve(base64);
                };
                reader.readAsDataURL(file);
            });
            
            imagenesBase64.push({
                data: base64Data,
                mimeType: file.type,
                nombre: file.name
            });
        }
        
        mensajeDiv.innerHTML = '<div class="loading">⏳ Enviando datos y subiendo ' + imagenesBase64.length + ' imágenes...</div>';
        
        // Enviar a Apps Script
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    action: 'guardarDatosConImagenes',
                    datosTexto: datosTexto,
                    imagenesBase64: imagenesBase64
                })
            });
            
            const result = await response.json();
            
            if (result.result === 'ok') {
                mensajeDiv.innerHTML = `<div class="success">✅ Datos enviados correctamente.<br>
                📸 Imágenes subidas: ${result.imagenesSubidas || 0}<br>
                💾 Revisa tu hoja de cálculo y carpeta IMAGENES</div>`;
                
                document.getElementById('ventaForm').reset();
                cargarPersistentes();
                selectedPlanObj = null;
                document.getElementById('planesContainer').innerHTML = '<p style="color: #718096;">Primero elige tipo de plan y modalidad</p>';
                ocultarBeneficios();
                document.getElementById('domiciliacionCheckbox').checked = false;
                previewDiv.classList.add('hidden');
                inputImagenes.value = '';
                
                setTimeout(() => mensajeDiv.innerHTML = '', 8000);
            } else {
                mensajeDiv.innerHTML = `<div class="error">❌ Error: ${result.error || 'Error desconocido'}</div>`;
            }
        } catch (error) {
            console.error("Error:", error);
            mensajeDiv.innerHTML = `<div class="error">❌ Error de comunicación: ${error.message}</div>`;
        }
    });

    cargarSelectores();
    cargarPersistentes();
    manejarTipoVenta();
</script>
</body>
</html>
